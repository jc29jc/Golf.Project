    <h1>Golf Handicap Calculator</h1>
    <p>Enter your scores below to create your own handicap</p>
   <div class="calc-box">
        <h3>Enter Your 5 Scores:</h3>
        <input type="number" id="score1" placeholder="Round 1 Score (e.g., 85)">
        <input type="number" id="score2" placeholder="Round 2 Score (e.g., 88)">
        <input type="number" id="score3" placeholder="Round 3 Score (e.g., 82)">
        <input type="number" id="score4" placeholder="Round 4 Score (e.g., 89)">
        <input type="number" id="score5" placeholder="Round 5 Score (e.g., 84)">

        <h3>Course Information:</h3>
        <label>Course Rating:</label>
        <input type="number" id="courseRating" step="0.1" placeholder="e.g., 72.0">

        <label>Slope Rating:</label>
        <input type="number" id="slopeRating" placeholder="e.g., 125">

        <button onclick="calculateAverageHandicap()">Calculate Average Handicap</button>
    </div>

    <div id="handicapResult" class="calc-result">
        <h2>Your Handicap:</h2>
        <p id="differentialValue">0.0</p>
        <p style="font-size: 14px; font-style: italic; color: #555;">(The average of your five scores & the course stats are what make up your handicap)</p>
    </div>

    <script src="handicap.js"></script>
