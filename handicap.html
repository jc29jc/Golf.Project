<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golf Hub - Handicap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html">Home</a> | 
        <a href="handicap.html">Handicap Calculator</a> | 
        <a href="leaderboard.html">Leaderboard</a> | 
        <a href="game.html">Golf Game</a>
    </nav>
    
    <h1>Golf Handicap Calculator</h1>
    <p>Enter your scores below to create your own handicap</p>
    <div class="calc-box">
        <label>Gross Score:</label>
        <input type="number" id="grossScore" placeholder="85"

        <label>Course Rating:</label>
        <input type="number" id="courseRating" step="0.1" placeholder="72.0">

        <label>Slope Rating:</label>
        <input type="number" id="slopeRating" placeholder="125">

        <button onclick="calculateHandicap()">Calculate</button>
    </div>

    <div id="handicapResult" class="calc-result">
        <h2>Your Score Differential:</h2>
        <p id="differentialValue">0.0</p>
    </div>

    <script src="handicap.js"></script>

</body>
</html>
